# src/main/resources/redisson.yaml

singleServerConfig:
  # 地址格式：redis://IP:端口  或  rediss://IP:端口 (SSL)
  address: "redis://127.0.0.1:6379"

  # 密码 (如果没有密码，注释掉或删除此行)
#  password: "your_password"

#  # 客户端名称 (可选，方便监控)
#  clientName: "my-app-server"

  # 连接池配置 (重要：生产环境建议调整)
  connectionMinimumIdleSize: 10   # 最小空闲连接数
  connectionPoolSize: 64          # 最大连接池大小
  idleConnectionTimeout: 10000    # 空闲连接超时时间 (毫秒)
  connectTimeout: 10000           # 连接建立超时时间 (毫秒)
  timeout: 3000                   # 命令等待超时时间 (毫秒)
  retryAttempts: 3                # 失败重试次数
  retryInterval: 1500             # 重试间隔 (毫秒)

# 其他全局配置 (可选)
#threads: 0            # 0 表示根据当前处理器核数 * 2 自动设置
#nettyThreads: 0       # 0 表示自动设置
#codec: !<org.redisson.codec.JsonJacksonCodec> {} # 使用 JSON 序列化 (推荐，方便调试)